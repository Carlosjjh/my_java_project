spring.application.name=simple-mall
spring.config.import=optional:file:.env[.properties]
debug=false
server.port=8081
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/simple_mall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:simple-mall}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=carlos.jiang.kafka
spring.kafka.consumer.properties.spring.json.value.default.type=carlos.jiang.kafka.OrderCreatedEvent
app.kafka.enabled=${KAFKA_ENABLED:false}
app.kafka.order-created-topic=${KAFKA_ORDER_CREATED_TOPIC:mall.order.created}
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.root=INFO
