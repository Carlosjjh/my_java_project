<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mall</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div>
            <p class="eyebrow">Spring Boot Mall</p>
            <h1>Simple Mall</h1>
        </div>
        <div class="summary">
            <span id="cartCount">0 件商品</span>
            <strong id="cartTotal">¥0.00</strong>
        </div>
    </header>

    <main class="layout">
        <section class="products-section">
            <div class="section-title">
                <h2>商品</h2>
                <button id="refreshProducts" type="button">刷新</button>
            </div>
            <div id="productGrid" class="product-grid"></div>
        </section>

        <aside class="checkout-panel">
            <section>
                <div class="section-title">
                    <h2>购物车</h2>
                    <button id="clearCart" type="button">清空</button>
                </div>
                <div id="cartItems" class="cart-items empty">购物车为空</div>
            </section>

            <form id="orderForm" class="order-form">
                <h2>收货信息</h2>
                <label>
                    姓名
                    <input name="customerName" autocomplete="name" required>
                </label>
                <label>
                    手机号
                    <input name="phone" autocomplete="tel" required>
                </label>
                <label>
                    地址
                    <textarea name="address" rows="3" required></textarea>
                </label>
                <button class="primary" type="submit">提交订单</button>
                <p id="message" class="message"></p>
            </form>

            <section>
                <div class="section-title">
                    <h2>最近订单</h2>
                    <button id="refreshOrders" type="button">查看</button>
                </div>
                <div id="orderList" class="orders empty">暂无订单</div>
            </section>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
