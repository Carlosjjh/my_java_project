<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mall v2.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="authGate" class="auth-gate">
        <section class="auth-card">
            <p class="eyebrow">Spring Boot Mall v2.0</p>
            <h1>Simple Mall</h1>
            <p class="hint">Please sign in before browsing products.</p>

            <div class="auth-forms">
                <form id="loginForm" class="compact-form">
                    <h2>Sign In</h2>
                    <label>
                        Account
                        <input name="account" autocomplete="username" required>
                    </label>
                    <label>
                        Password
                        <input name="password" type="password" autocomplete="current-password" required>
                    </label>
                    <button class="primary" type="submit">Sign In</button>
                </form>

                <form id="registerForm" class="compact-form">
                    <h2>Create Account</h2>
                    <label>
                        User Name
                        <input name="username" autocomplete="name" required>
                    </label>
                    <label>
                        Account
                        <input name="account" autocomplete="username" required>
                    </label>
                    <label>
                        Password
                        <input name="password" type="password" autocomplete="new-password" minlength="6" required>
                    </label>
                    <button type="submit">Register and Sign In</button>
                </form>
            </div>
            <p id="authMessage" class="message"></p>
        </section>
    </main>

    <div id="appShell" class="hidden">
        <header class="topbar">
            <div>
                <p class="eyebrow">Spring Boot Mall v2.0</p>
                <h1>Simple Mall</h1>
            </div>
            <div class="summary">
                <span id="cartCount">0 items</span>
                <strong id="cartTotal">¥0.00</strong>
            </div>
        </header>

        <main class="layout">
            <section class="products-section">
                <div class="section-title">
                    <h2>Products</h2>
                    <button id="refreshProducts" type="button">Refresh</button>
                </div>
                <div id="productGrid" class="product-grid"></div>
            </section>

            <aside class="checkout-panel">
                <section class="account-section">
                    <div class="section-title">
                        <h2>Account</h2>
                        <button id="logoutButton" type="button">Sign Out</button>
                    </div>
                    <div id="userPanel" class="user-panel"></div>
                </section>

                <form id="profileForm" class="order-form">
                    <h2>Shipping Profile</h2>
                    <label>
                        Recipient
                        <input name="recipientName" autocomplete="name" required>
                    </label>
                    <label>
                        Phone
                        <input name="phone" autocomplete="tel" required>
                    </label>
                    <label>
                        Address
                        <textarea name="address" rows="3" required></textarea>
                    </label>
                    <button class="primary" type="submit">Save Shipping Profile</button>
                    <p id="profileMessage" class="message"></p>
                </form>

                <section>
                    <div class="section-title">
                        <h2>Cart</h2>
                        <button id="clearCart" type="button">Clear</button>
                    </div>
                    <div id="cartItems" class="cart-items empty">Cart is empty</div>
                </section>

                <form id="orderForm" class="order-form">
                    <h2>Checkout</h2>
                    <p class="hint">Orders use the saved shipping profile.</p>
                    <button class="primary" type="submit">Place Order</button>
                    <p id="message" class="message"></p>
                </form>

                <section>
                    <div class="section-title">
                        <h2>Recent Orders</h2>
                        <button id="refreshOrders" type="button">Refresh</button>
                    </div>
                    <div id="orderList" class="orders empty">No orders yet</div>
                </section>
            </aside>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
